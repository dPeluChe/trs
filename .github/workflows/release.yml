name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: trs
            artifact: trs-linux-x64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: trs
            artifact: trs-linux-arm64

          - target: x86_64-apple-darwin
            os: macos-latest
            binary: trs
            artifact: trs-darwin-x64

          - target: aarch64-apple-darwin
            os: macos-latest
            binary: trs
            artifact: trs-darwin-arm64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: trs.exe
            artifact: trs-windows-x64.exe

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/${{ matrix.binary }}
          else
            strip target/${{ matrix.target }}/release/${{ matrix.binary }}
          fi

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/trs-linux-x64/trs-linux-x64
            artifacts/trs-linux-arm64/trs-linux-arm64
            artifacts/trs-darwin-x64/trs-darwin-x64
            artifacts/trs-darwin-arm64/trs-darwin-arm64
            artifacts/trs-windows-x64.exe/trs-windows-x64.exe
